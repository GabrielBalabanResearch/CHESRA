elasticity_estimation:
  displacement_db: ""
  lower_bound: ""
  method: TNC
  optimization_tol: 1.0e-06
  printlosses: true
material_parameters: ""
mechdata: ""
mesh:
  dbpath_fibre: e_fibre
  dbpath_sheet: e_sheet
  facet_markers:
    LV_endo: 30
    RV_endo: 20
    base: 10
    epi: 40
  mesh_markers:
    LV: 0
    RV: 2
    septum: 1
  microstructure: ""
  path: ""
numerics:
  FEM_degree: 1
  base_spring_k:
    ex_vivo_Klotz: 0 #Indicates no base spring. Base is completely fixed.
    in_vivo_CMR: 10
  compress:
    ex_vivo_Klotz:
      model: reduced_yeoh
      parameters:
        K1: 7.31
        K2: 5.12
        K3: 2490000.0
    in_vivo_CMR:
      model: quad
      parameters:
        K: 10
  nonlinear_solver_params:
    nonlinear_solver: snes
    snes_solver:
      absolute_tolerance: 0.0001
      linear_solver: mumps
      lu_solver:
        symmetric: true
      maximum_iterations: 60
      method: newtonls
      report: false
      solution_tolerance: 0.0001
output:
  files:
    logfile: ""
    path: ""
  screen:
    PV_incrementer: false
    continuity_solver: false
    dolfin_log_level: 50